<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
</head>


<body class="mainText" style="background-color: #1e1e24;">
    <h1 class="extraLargeText" style="margin-left: 30px;">Ваша підтримка нам важлива.</h1>
    <div class="formWrapper">
        <form action="add-com" id="addExpForm">

            <h2 class="extraLargeText">Залиште свій коментар</h2>
            <h4 class="secondary largeText">Нам важлива ваша думка))</h4>
            <div class="smallText">
                <input type="text" placeholder="Відгук про бананчіків" name="comment">
                <input type="email" placeholder="Ваша пошта" name="emailUser">
            </div>
            <div class="addRowwing smallText">
                <p>Ваша оцінка БАНАНЧІКАМ</p>
                <select name="rating" id="rating" style="height: 25px; ">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <button class="largeText bananaColor">Відправити</button>
        </form>
    </div>
</body>

</html>
